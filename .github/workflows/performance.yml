name: performance

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run performance tests
        shell: pwsh
        run: |
          ./scripts/run-jmeter.ps1 -Mode both

      - name: Prepare Pages site
        if: always()
        shell: bash
        run: |
          rm -rf site
          mkdir -p site/reports/load site/reports/spike
          cp -R reports/load/html-report site/reports/load/
          cp -R reports/spike/html-report site/reports/spike/
          cp reports/EXECUTION_REPORT.md site/reports/
          cat > site/index.html <<'EOF'
          <!doctype html>
          <html lang="pt-BR">
            <head>
              <meta charset="utf-8" />
              <meta http-equiv="refresh" content="0; url=/reports/" />
              <title>BlazeDemo Performance</title>
            </head>
            <body>
              <p>Redirecionando para <a href="/reports/">/reports/</a>...</p>
            </body>
          </html>
          EOF
          cat > site/reports/index.html <<'EOF'
          <!doctype html>
          <html lang="pt-BR">
            <head>
              <meta charset="utf-8" />
              <title>BlazeDemo Performance Reports</title>
            </head>
            <body>
              <h1>BlazeDemo Performance Reports</h1>
              <ul>
                <li><a href="load/html-report/index.html">Teste de carga</a></li>
                <li><a href="spike/html-report/index.html">Teste de pico</a></li>
                <li><a href="EXECUTION_REPORT.md">Relatorio de execucao</a></li>
              </ul>
            </body>
          </html>
          EOF

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
