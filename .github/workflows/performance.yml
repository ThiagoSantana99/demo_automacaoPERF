name: performance

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  jmeter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run performance tests
        shell: pwsh
        run: |
          ./scripts/run-jmeter.ps1 -Mode both

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-reports
          path: |
            reports/load/**
            reports/spike/**
